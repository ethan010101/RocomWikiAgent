<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>洛克王国 Wiki 智能助手</title>
    <link rel="icon" type="image/png" href="" id="appFavicon" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #e8ecf4;
        color: #222;
      }
      .app-shell {
        display: flex;
        min-height: 100vh;
        align-items: stretch;
      }
      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background: #1e2a4a;
        color: #e8edf7;
        display: flex;
        flex-direction: column;
        padding: 16px 12px;
        box-sizing: border-box;
      }
      .sidebar-brand {
        font-size: 14px;
        font-weight: 600;
        padding: 8px 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        margin-bottom: 12px;
      }
      .nav-btn {
        display: block;
        width: 100%;
        text-align: left;
        padding: 10px 12px;
        margin-bottom: 8px;
        border: none;
        border-radius: 8px;
        background: #2b6cff;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      .nav-btn:hover {
        filter: brightness(1.08);
      }
      .nav-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .nav-btn.secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #e8edf7;
      }
      .nav-btn.secondary:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .sidebar-section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.45);
        padding: 12px 10px 8px;
      }
      .history-list {
        flex: 1;
        overflow-y: auto;
        margin: 0 -4px;
        padding: 0 4px;
      }
      .history-item-row {
        display: flex;
        align-items: stretch;
        gap: 2px;
        margin-bottom: 4px;
        border-radius: 8px;
      }
      .history-item-row.active .history-item {
        background: rgba(43, 108, 255, 0.35);
      }
      .history-item {
        flex: 1;
        min-width: 0;
        display: block;
        text-align: left;
        padding: 10px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: #e8edf7;
        font-size: 13px;
        cursor: pointer;
        line-height: 1.35;
      }
      .history-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .history-item-row.active .history-item:hover {
        background: rgba(43, 108, 255, 0.42);
      }
      .history-item-delete {
        flex-shrink: 0;
        width: 34px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.38);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .history-item-delete:hover {
        background: rgba(255, 80, 80, 0.25);
        color: #ffb4b4;
      }
      .history-item-delete:disabled {
        opacity: 0.25;
        cursor: not-allowed;
      }
      .history-item-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .history-item-time {
        display: block;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 4px;
      }
      .main-area {
        flex: 1;
        min-width: 0;
        padding: 20px;
        overflow: auto;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .app-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
      }
      .app-header .logo-header {
        height: 48px;
        width: auto;
        max-width: 160px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .app-header h2 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.25;
      }
      .chat-box {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        min-height: 420px;
        max-height: min(72vh, 900px);
        border: 1px solid #ddd;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .msg-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 12px 0;
        width: 100%;
      }
      .msg-row.user {
        flex-direction: row-reverse;
      }
      .msg-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        border: 1px solid #e0e4ee;
        background: #fff;
      }
      .msg-bubble {
        flex: 0 1 auto;
        width: fit-content;
        max-width: min(100em, 100%);
        min-width: 0;
        padding: 10px 14px;
        border-radius: 14px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        box-sizing: border-box;
      }
      .msg-bubble.user {
        background: #dff0ff;
        border: 1px solid #c8e6ff;
      }
      .msg-bubble.bot {
        background: #f0f3f8;
        border: 1px solid #e2e6ef;
      }
      .stream-status {
        font-size: 13px;
        color: #666;
        margin-bottom: 8px;
      }
      details.reasoning {
        margin-top: 8px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #dde3ee;
        font-size: 13px;
        line-height: 1.5;
        color: #334;
        max-width: 100%;
        box-sizing: border-box;
      }
      details.reasoning summary {
        cursor: pointer;
        font-weight: 600;
        color: #1a4a8c;
      }
      .reasoning-body {
        margin-top: 8px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        max-width: 100%;
      }
      .answer-body {
        margin-top: 10px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        max-width: 100%;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .input-row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }
      button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: #2b6cff;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="导航">
        <div class="sidebar-brand">洛克 Wiki 助手</div>
        <button type="button" class="nav-btn" id="btnNewChat">＋ 新增对话</button>
        <div class="sidebar-section-title">历史对话</div>
        <div class="history-list" id="historyList"></div>
      </aside>
      <div class="main-area">
        <div class="container">
          <header class="app-header">
            <img
              class="logo-header"
              id="appLogo"
              src=""
              alt="洛克王国 Wiki"
              width="160"
              height="48"
            />
            <h2>洛克王国 Wiki 智能助手</h2>
          </header>
          <div id="chatBox" class="chat-box"></div>
          <div class="input-row">
            <input id="inputText" placeholder="输入问题，例如：雨天队推荐核心精灵有哪些？" />
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // file:// 打开时用相对路径；通过 http://127.0.0.1:8000/ 打开时用后端挂载的 /assets/
      const ASSET_BASE =
        location.protocol === "file:" ? "assets/" : "/assets/";

      (function initAssets() {
        const fav = document.getElementById("appFavicon");
        if (fav) fav.href = ASSET_BASE + "favicon.png";
        const logo = document.getElementById("appLogo");
        if (logo) {
          logo.src = ASSET_BASE + "header.png";
          logo.addEventListener("error", () => {
            logo.style.display = "none";
          });
        }
      })();

      const LS_CONV = "rocomWiki_conversations_v1";
      const LS_CURRENT = "rocomWiki_current_conv_id";

      const API_ORIGIN =
        location.protocol === "file:"
          ? "http://127.0.0.1:8000"
          : location.origin;

      const chatBox = document.getElementById("chatBox");
      const inputText = document.getElementById("inputText");
      const sendBtn = document.getElementById("sendBtn");
      const historyList = document.getElementById("historyList");
      const btnNewChat = document.getElementById("btnNewChat");

      let conversations = [];
      let currentConvId = null;

      const ASSET_USER = ASSET_BASE + "user.png";
      const ASSET_BOT = ASSET_BASE + "bot.jpg";

      function hideBrokenImg(img) {
        img.addEventListener("error", () => {
          img.style.display = "none";
        });
      }

      function loadConversations() {
        try {
          const raw = localStorage.getItem(LS_CONV);
          conversations = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(conversations)) conversations = [];
        } catch {
          conversations = [];
        }
      }

      let _serverSaveTimer = null;

      function saveConversations() {
        try {
          localStorage.setItem(LS_CONV, JSON.stringify(conversations));
        } catch (e) {
          console.warn("localStorage save failed", e);
        }
        if (currentConvId) {
          try {
            localStorage.setItem(LS_CURRENT, currentConvId);
          } catch (e) {
            /* ignore */
          }
        } else {
          try {
            localStorage.removeItem(LS_CURRENT);
          } catch (e) {
            /* ignore */
          }
        }
        renderHistoryList();
        scheduleServerSave();
      }

      function scheduleServerSave() {
        clearTimeout(_serverSaveTimer);
        _serverSaveTimer = setTimeout(() => {
          void syncConversationsToServer();
        }, 450);
      }

      async function syncConversationsToServer() {
        try {
          const res = await fetch(API_ORIGIN + "/api/conversations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              conversations,
              currentConvId,
            }),
          });
          if (!res.ok) console.warn("persist conversations HTTP", res.status);
        } catch (e) {
          console.warn("persist conversations failed", e);
        }
      }

      async function hydrateConversationsFromServer() {
        loadConversations();
        let usedRemoteList = false;
        try {
          const res = await fetch(API_ORIGIN + "/api/conversations");
          if (!res.ok) {
            try {
              currentConvId = localStorage.getItem(LS_CURRENT) || null;
            } catch (e) {
              currentConvId = null;
            }
            return;
          }
          const d = await res.json();
          const remote = Array.isArray(d.conversations) ? d.conversations : [];
          if (remote.length > 0) {
            usedRemoteList = true;
            conversations = remote;
            currentConvId =
              d.currentConvId && typeof d.currentConvId === "string"
                ? d.currentConvId
                : null;
            try {
              localStorage.setItem(LS_CONV, JSON.stringify(conversations));
              if (currentConvId) localStorage.setItem(LS_CURRENT, currentConvId);
              else localStorage.removeItem(LS_CURRENT);
            } catch (e) {
              /* ignore */
            }
          } else if (conversations.length > 0) {
            await syncConversationsToServer();
          }
        } catch (e) {
          console.warn("load conversations from server failed", e);
        }
        if (!usedRemoteList) {
          if (conversations.length === 0) {
            currentConvId = null;
          } else {
            try {
              currentConvId = localStorage.getItem(LS_CURRENT) || null;
            } catch (e) {
              currentConvId = null;
            }
          }
        }
      }

      function formatTime(ts) {
        const d = new Date(ts);
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function renderHistoryList() {
        historyList.innerHTML = "";
        const sorted = [...conversations].sort(
          (a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)
        );
        if (!sorted.length) {
          const empty = document.createElement("div");
          empty.style.cssText =
            "padding:12px 10px;font-size:12px;color:rgba(255,255,255,0.35);";
          empty.textContent = "暂无记录，开始新对话吧";
          historyList.appendChild(empty);
          return;
        }
        for (const c of sorted) {
          const row = document.createElement("div");
          row.className =
            "history-item-row" + (c.id === currentConvId ? " active" : "");
          row.dataset.id = c.id;

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "history-item";
          btn.dataset.id = c.id;
          const t = document.createElement("span");
          t.className = "history-item-title";
          t.textContent = c.title || "未命名对话";
          const tm = document.createElement("span");
          tm.className = "history-item-time";
          tm.textContent = formatTime(c.updatedAt || Date.now());
          btn.appendChild(t);
          btn.appendChild(tm);
          btn.addEventListener("click", () => openConversation(c.id));

          const del = document.createElement("button");
          del.type = "button";
          del.className = "history-item-delete";
          del.setAttribute("aria-label", "删除对话");
          del.setAttribute("title", "删除");
          del.textContent = "×";
          del.disabled = sendBtn.disabled;
          del.addEventListener("click", (e) => deleteConversation(c.id, e));

          row.appendChild(btn);
          row.appendChild(del);
          historyList.appendChild(row);
        }
      }

      function clearChatUi() {
        chatBox.innerHTML = "";
      }

      function addMessage(role, text) {
        const row = document.createElement("div");
        row.className = `msg-row ${role}`;
        const av = document.createElement("img");
        av.className = "msg-avatar";
        av.src = role === "user" ? ASSET_USER : ASSET_BOT;
        av.alt = role === "user" ? "我" : "助手";
        hideBrokenImg(av);
        const bubble = document.createElement("div");
        bubble.className = `msg-bubble ${role}`;
        bubble.textContent = text;
        row.appendChild(av);
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function appendAssistantStatic(reasoning, answer) {
        const row = document.createElement("div");
        row.className = "msg-row bot";
        const av = document.createElement("img");
        av.className = "msg-avatar";
        av.src = ASSET_BOT;
        av.alt = "助手";
        hideBrokenImg(av);
        const wrap = document.createElement("div");
        wrap.className = "msg-bubble bot";
        const r = (reasoning || "").trim();
        if (r) {
          const details = document.createElement("details");
          details.className = "reasoning";
          details.open = false;
          const sum = document.createElement("summary");
          sum.textContent = "思考过程（reasoning_content 流）";
          const reasoningEl = document.createElement("div");
          reasoningEl.className = "reasoning-body";
          reasoningEl.textContent = r;
          details.appendChild(sum);
          details.appendChild(reasoningEl);
          wrap.appendChild(details);
        }
        const head = document.createElement("div");
        head.textContent = "助手：";
        head.style.fontWeight = "600";
        head.style.marginTop = "10px";
        const answerEl = document.createElement("div");
        answerEl.className = "answer-body";
        answerEl.textContent = answer || "（无回答）";
        wrap.appendChild(head);
        wrap.appendChild(answerEl);
        row.appendChild(av);
        row.appendChild(wrap);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function renderConversationMessages(conv) {
        clearChatUi();
        if (!conv || !conv.messages) return;
        for (const m of conv.messages) {
          if (m.type === "user") {
            addMessage("user", m.text || "");
          } else if (m.type === "assistant") {
            appendAssistantStatic(m.reasoning || "", m.answer || "");
          }
        }
      }

      function openConversation(id) {
        if (sendBtn.disabled) return;
        const conv = conversations.find((c) => c.id === id);
        if (!conv) return;
        currentConvId = id;
        renderConversationMessages(conv);
        saveConversations();
      }

      function deleteConversation(id, ev) {
        if (ev) {
          ev.stopPropagation();
          ev.preventDefault();
        }
        if (sendBtn.disabled) return;
        if (!confirm("确定删除这条对话？删除后无法恢复。")) return;
        const idx = conversations.findIndex((c) => c.id === id);
        if (idx < 0) return;
        conversations.splice(idx, 1);
        if (currentConvId === id) {
          currentConvId = null;
          clearChatUi();
        }
        saveConversations();
      }

      function startNewChat() {
        if (sendBtn.disabled) return;
        currentConvId = null;
        clearChatUi();
        saveConversations();
        inputText.focus();
      }

      function beginStreamBot() {
        const row = document.createElement("div");
        row.className = "msg-row bot";
        const av = document.createElement("img");
        av.className = "msg-avatar";
        av.src = ASSET_BOT;
        av.alt = "助手";
        hideBrokenImg(av);
        const wrap = document.createElement("div");
        wrap.className = "msg-bubble bot";
        const statusEl = document.createElement("div");
        statusEl.className = "stream-status";
        statusEl.textContent = "正在检索…";
        const details = document.createElement("details");
        details.className = "reasoning";
        details.open = true;
        const sum = document.createElement("summary");
        sum.textContent = "思考过程（reasoning_content 流）";
        const reasoningEl = document.createElement("div");
        reasoningEl.className = "reasoning-body";
        details.appendChild(sum);
        details.appendChild(reasoningEl);
        const head = document.createElement("div");
        head.textContent = "助手：";
        head.style.fontWeight = "600";
        head.style.marginTop = "10px";
        const answerEl = document.createElement("div");
        answerEl.className = "answer-body";
        wrap.appendChild(statusEl);
        wrap.appendChild(details);
        wrap.appendChild(head);
        wrap.appendChild(answerEl);
        row.appendChild(av);
        row.appendChild(wrap);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
        return { statusEl, details, reasoningEl, answerEl, row };
      }

      async function sendMessage() {
        const msg = inputText.value.trim();
        if (!msg) return;

        if (!currentConvId) {
          currentConvId =
            "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
          conversations.unshift({
            id: currentConvId,
            title: msg.length > 28 ? msg.slice(0, 28) + "…" : msg,
            updatedAt: Date.now(),
            messages: [],
          });
          saveConversations();
        }

        const conv = conversations.find((c) => c.id === currentConvId);
        if (!conv) {
          startNewChat();
          return sendMessage();
        }

        addMessage("user", `你：${msg}`);
        conv.messages.push({ type: "user", text: `你：${msg}` });
        conv.updatedAt = Date.now();
        saveConversations();

        inputText.value = "";
        sendBtn.disabled = true;
        btnNewChat.disabled = true;
        renderHistoryList();

        const { statusEl, details, reasoningEl, answerEl } = beginStreamBot();
        let sseBuf = "";

        try {
          const res = await fetch(API_ORIGIN + "/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: msg,
              history_messages: conv.messages,
              context_state: {},
            }),
          });
          if (!res.ok) {
            statusEl.textContent = "请求失败（HTTP " + res.status + "）";
            answerEl.textContent = statusEl.textContent;
            return;
          }
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            sseBuf += dec.decode(value, { stream: true });
            let sep;
            while ((sep = sseBuf.indexOf("\n\n")) >= 0) {
              const block = sseBuf.slice(0, sep).trim();
              sseBuf = sseBuf.slice(sep + 2);
              if (!block.startsWith("data:")) continue;
              const line = block.replace(/^data:\s?/, "");
              let data;
              try {
                data = JSON.parse(line);
              } catch {
                continue;
              }
              if (data.type === "status") {
                statusEl.textContent = data.message || "";
              } else if (data.type === "reasoning") {
                reasoningEl.textContent += data.delta || "";
              } else if (data.type === "content") {
                statusEl.textContent = "";
                answerEl.textContent += data.delta || "";
              } else if (data.type === "error") {
                statusEl.textContent = data.message || "出错";
              } else if (data.type === "done") {
                statusEl.textContent = "";
              }
              chatBox.scrollTop = chatBox.scrollHeight;
            }
          }
        } catch (e) {
          statusEl.textContent = "请求失败，请确认后端已启动。";
          answerEl.textContent = statusEl.textContent;
        } finally {
          const reasoningSaved = (reasoningEl.textContent || "").trim();
          if (!reasoningSaved) {
            details.remove();
          }
          if (
            !answerEl.textContent.trim() &&
            !(statusEl.textContent && statusEl.textContent.trim())
          ) {
            answerEl.textContent = "（无回答）";
          }
          const answerSaved = answerEl.textContent || "";
          conv.messages.push({
            type: "assistant",
            reasoning: reasoningSaved,
            answer: answerSaved,
          });
          conv.updatedAt = Date.now();
          saveConversations();

          sendBtn.disabled = false;
          btnNewChat.disabled = false;
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      btnNewChat.addEventListener("click", startNewChat);

      sendBtn.addEventListener("click", sendMessage);
      inputText.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      window.addEventListener("beforeunload", () => {
        clearTimeout(_serverSaveTimer);
        try {
          const raw = JSON.stringify({ conversations, currentConvId });
          if (raw.length > 60000) return;
          navigator.sendBeacon(
            API_ORIGIN + "/api/conversations",
            new Blob([raw], { type: "application/json" }),
          );
        } catch (e) {
          /* ignore */
        }
      });

      (async function initConversations() {
        await hydrateConversationsFromServer();
        if (!currentConvId) {
          currentConvId = localStorage.getItem(LS_CURRENT) || null;
        }
        if (currentConvId) {
          const c = conversations.find((x) => x.id === currentConvId);
          if (c) renderConversationMessages(c);
          else {
            currentConvId = null;
            try {
              localStorage.removeItem(LS_CURRENT);
            } catch (e) {
              /* ignore */
            }
            saveConversations();
          }
        }
        renderHistoryList();
      })();
    </script>
  </body>
</html>
